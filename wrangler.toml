name = "structure-api"
main = "src/index.ts"
compatibility_date = "2025-06-01"
compatibility_flags = ["nodejs_compat"]

# Custom domain — ensures `wrangler deploy` preserves the binding
routes = [{ pattern = "api.optimisingperformance.com.au", custom_domain = true }]

# Secrets are set via `wrangler secret put <KEY>`
# STRIPE_SECRET_KEY
# STRIPE_PRICE_ID
# STRIPE_COUPON_ID
# STRIPE_WEBHOOK_SECRET
# FIRSTPROMOTER_API_KEY
# FIRSTPROMOTER_ACCOUNT_ID
# RESEND_API_KEY
# DO_API_TOKEN
# CLERK_JWKS_URL
# CLERK_CUSTOMER_JWKS_URL
# CLERK_SECRET_KEY
# ALLOWED_ORIGINS
# CF_API_TOKEN          — Cloudflare API token for DNS record management
# CF_ZONE_ID            — Cloudflare Zone ID for optimisingperformance.com.au

[observability]
enabled = true
